<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="4K Wallpaper App - High quality wallpapers for your device">
    <title>WallFlare - 4K Wallpapers</title>
    <link rel="manifest" href="pwa/manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Professional Splash Screen - Developed by Nitai Studio - Made in India -->
    <div id="splashScreen" class="splash-screen">
        <!-- Background Particles -->
        <div class="splash-particles" id="splashParticles"></div>
        
        <!-- Gradient Orbs -->
        <div class="splash-orb orb-1"></div>
        <div class="splash-orb orb-2"></div>
        <div class="splash-orb orb-3"></div>
        
        <!-- Main Content -->
        <div class="splash-content">
            <!-- Logo Container -->
            <div class="splash-logo-wrapper">
                <div class="splash-logo-ring"></div>
                <div class="splash-logo">
                    <svg width="90" height="90" viewBox="0 0 90 90" fill="none">
                        <!-- Rotating Outer Ring -->
                        <circle cx="45" cy="45" r="42" stroke="url(#ringGradient)" stroke-width="2.5" stroke-dasharray="60 200" stroke-linecap="round">
                            <animateTransform attributeName="transform" type="rotate" from="0 45 45" to="360 45 45" dur="8s" repeatCount="indefinite"/>
                        </circle>
                        <!-- Icon Background -->
                        <rect x="15" y="15" width="60" height="60" rx="18" fill="url(#iconGradient)"/>
                        <!-- Play Button -->
                        <path d="M32 28v34l30-17-30-17z" fill="white"/>
                        <!-- Sparkle -->
                        <circle cx="65" cy="25" r="3" fill="#FFD700">
                            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <defs>
                            <linearGradient id="ringGradient" x1="0" y1="0" x2="90" y2="90">
                                <stop offset="0%" stop-color="#6C63FF"/>
                                <stop offset="50%" stop-color="#FF6B6B"/>
                                <stop offset="100%" stop-color="#3F8CFF"/>
                            </linearGradient>
                            <linearGradient id="iconGradient" x1="15" y1="15" x2="75" y2="75">
                                <stop offset="0%" stop-color="#6C63FF"/>
                                <stop offset="100%" stop-color="#3F8CFF"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>
            
            <!-- App Name -->
            <h1 class="splash-title">
                <span class="title-gradient">WallFlare</span>
            </h1>
            <p class="splash-subtitle">Premium 4K Wallpapers</p>
            
            <!-- Loading Bar -->
            <div class="splash-loader">
                <div class="splash-loader-bar">
                    <div class="splash-loader-progress" id="splashProgress"></div>
                </div>
            </div>
            
            <!-- Developer Credit -->
            <div class="splash-credit">
                <div class="credit-divider">
                    <span>Developed by</span>
                </div>
                <p class="credit-studio">Nitai Studio</p>
                <div class="made-in-india">
                    <span class="india-flag">
                        <span class="flag-saffron"></span>
                        <span class="flag-white">
                            <span class="ashoka-chakra">✱</span>
                        </span>
                        <span class="flag-green"></span>
                    </span>
                    <span class="made-in-text">Made in India 🇮🇳</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container">
        <!-- Glassmorphism Top App Bar -->
        <header class="top-app-bar">
            <div class="app-bar-content">
                <h1 class="app-title">WallFlare</h1>
                <div class="app-bar-actions">
                    <button class="icon-button" id="searchToggle" aria-label="Search">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                    </button>
                    <button class="icon-button" id="historyBtn" aria-label="History">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- Search Bar (Hidden by default) -->
            <div class="search-container" id="searchContainer" style="display: none;">
                <div class="search-input-wrapper">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search wallpapers...">
                    <button class="icon-button-small" id="searchClose">✕</button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content" id="mainContent">
            <!-- Category Filter Chips -->
            <div class="category-chips-container">
                <div class="category-chips" id="categoryChips">
                    <button class="chip active" data-label="all">All</button>
                    <button class="chip" data-label="nature">Nature</button>
                    <button class="chip" data-label="abstract">Abstract</button>
                    <button class="chip" data-label="anime">Anime</button>
                    <button class="chip" data-label="cars">Cars</button>
                    <button class="chip" data-label="space">Space</button>
                    <button class="chip" data-label="minimal">Minimal</button>
                    <button class="chip" data-label="dark">Dark</button>
                </div>
            </div>

            <!-- Wallpaper Grid -->
            <div class="wallpaper-grid" id="wallpaperGrid">
                <!-- Skeleton Loaders will be inserted here -->
            </div>

            <!-- Loading Indicator -->
            <div class="loading-indicator" id="loadingIndicator" style="display: none;">
                <div class="spinner"></div>
            </div>

            <!-- No Results Message -->
            <div class="no-results" id="noResults" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
                </svg>
                <p>No wallpapers found</p>
            </div>
        </main>

        <!-- Fullscreen Preview Modal -->
        <div class="fullscreen-modal" id="fullscreenModal">
            <div class="modal-backdrop" id="modalBackdrop"></div>
            <div class="modal-content">
                <button class="modal-close" id="modalClose">✕</button>
                <div class="modal-image-container" id="modalImageContainer">
                    <img id="modalImage" src="" alt="Wallpaper Preview">
                </div>
                <div class="modal-actions">
                    <button class="modal-action-btn" id="modalDownload">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>Download</span>
                    </button>
                    <button class="modal-action-btn" id="modalShare">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>
                        <span>Share</span>
                    </button>
                    <button class="modal-action-btn" id="modalFavorite">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        <span>Favorite</span>
                    </button>
                </div>
                <div class="modal-resolution-badge" id="modalResolution">4K</div>
            </div>
        </div>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Home</span>
            </button>
            <button class="nav-item" data-page="categories">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                <span>Categories</span>
            </button>
            <button class="nav-item" data-page="favorites">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span>Favorites</span>
            </button>
            <button class="nav-item" data-page="settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <span>Settings</span>
            </button>
        </nav>

        <!-- Settings Panel -->
        <div class="settings-panel" id="settingsPanel" style="display: none;">
            <div class="settings-header">
                <h2>Settings</h2>
                <button class="icon-button" id="settingsClose">✕</button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <span>Dark Mode</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button class="setting-btn" id="clearFavorites">Clear Favorites</button>
                <button class="setting-btn" id="viewHistory">Download History</button>
                <a href="pages/privacy.html" class="setting-link">Privacy Policy</a>
                <a href="pages/disclaimer.html" class="setting-link">Disclaimer</a>
                <a href="pages/about.html" class="setting-link">About</a>
            </div>
        </div>

        <!-- History Panel -->
        <div class="history-panel" id="historyPanel" style="display: none;">
            <div class="history-header">
                <h2>Download History</h2>
                <button class="icon-button" id="historyClose">✕</button>
            </div>
            <div class="history-content" id="historyContent">
                <p class="empty-state">No downloads yet</p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Install Prompt -->
    <div class="install-prompt" id="installPrompt" style="display: none;">
        <button id="installBtn">Add to Home Screen</button>
        <button id="dismissInstall">✕</button>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
